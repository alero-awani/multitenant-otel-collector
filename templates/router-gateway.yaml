apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-router-gateway
  namespace: otel-collector
  labels:
    app.kubernetes.io/name: otel-router-gateway
  annotations:
    helm.sh/hook-weight: "10"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-router-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-router-gateway
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --config=/conf/collector.yaml
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
          volumeMounts:
            - name: collector-config
              mountPath: /conf
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: metrics
              containerPort: 8888
      volumes:
        - name: collector-config
          configMap:
            name: otel-router-gateway-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-router-gateway-config
  namespace: otel-collector
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25

    exporters:
      {{- range .Values.tenants }}
      otlp/{{ .id }}:
        endpoint: "{{ .id }}-collector-opentelemetry-collector.monitoring-cluster.svc.cluster.local:4317"
        tls:
          insecure: true
      {{- end }}
      debug:
        verbosity: detailed

    connectors:
      routing:
        table:
          {{- range .Values.tenants }}
          - context: resource
            condition: 'attributes["tenant_id"] == "{{ .id }}"'
            pipelines: [metrics/{{ .id }}]
          {{- end }}

    service:
      pipelines:
        metrics/in:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [routing, debug]

        {{- range .Values.tenants }}
        metrics/{{ .id }}:
          receivers: [routing]
          exporters: [otlp/{{ .id }}]
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-router-gateway
  namespace: otel-collector
spec:
  selector:
    app.kubernetes.io/name: otel-router-gateway
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8888
      targetPort: 8888
  type: ClusterIP
