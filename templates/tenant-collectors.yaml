{{- range .Values.tenants }}
{{- $tenant := . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $tenant.id }}-collector
  namespace: monitoring-cluster
  labels:
    app.kubernetes.io/name: {{ $tenant.id }}-collector
  annotations:
    helm.sh/hook-weight: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $tenant.id }}-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $tenant.id }}-collector
    spec:
      containers:
        - name: otel-collector
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
          image: {{ $.Values.global.image.repository }}:{{ $.Values.global.image.tag }}
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          args:
            - --config=/conf/collector.yaml
          volumeMounts:
            - name: collector-config
              mountPath: /conf
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: metrics
              containerPort: 8888
      volumes:
        - name: collector-config
          configMap:
            name: {{ $tenant.id }}-collector-config
# Change the prometheus endpoint to be more dynamic for the backend they pick
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $tenant.id }}-collector-config
  namespace: monitoring-cluster
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318
    processors:
      resource:
        attributes:
          - action: insert
            key: collector_instance
            value: "{{ $tenant.id }}-collector"

    exporters:
      otlphttp:
        endpoint: {{ $.Values.prometheus.endpoint | quote }}
        tls:
          insecure: true
      debug:
        verbosity: detailed

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [resource]
          exporters: [otlphttp, debug]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $tenant.id }}-collector-opentelemetry-collector
  namespace: monitoring-cluster
  labels:
    app.kubernetes.io/name: {{ $tenant.id }}-collector

spec:
  selector:
    app.kubernetes.io/name: {{ $tenant.id }}-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8888
      targetPort: 8888
  type: ClusterIP
{{- end }}